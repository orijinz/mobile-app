workflows:
  android-build:
    name: Orijinz Daily - Android
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: latest
      java: 21
      groups:
        # Define this group in Codemagic UI: Teams > Personal Account > Environment variables.
        # Needed only once you set up Play Console signing/publishing.
        - orijinz_android
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync
      - name: Build Android APK/AAB
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - bradchase@live.com

  ios-build:
    name: Orijinz Daily - iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      groups:
        # Define this group in Codemagic UI: Teams > Personal Account > Environment variables.
        # Needed for App Store Connect API key (codesigning + optional TestFlight upload):
        #   APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER,
        #   APP_STORE_CONNECT_PRIVATE_KEY  (generate in App Store Connect > Users and Access > Keys)
        #   CERTIFICATE_PRIVATE_KEY  (a fresh 2048-bit RSA key in traditional/PKCS1 PEM
        #   format, BEGIN RSA PRIVATE KEY header — used to mint a brand-new Distribution
        #   certificate via --create, since fetch-signing-files can't reuse an existing
        #   cert it doesn't hold the private key for)
        - orijinz_ios
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync Capacitor
        script: npx cap sync
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files (create if missing)
        script: |
          app-store-connect fetch-signing-files com.convertify.entspire2 \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - bradchase@live.com
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # submit_to_testflight only matters for EXTERNAL testers (triggers Apple's
        # Beta App Review queue). As Account Holder you're an internal tester
        # automatically once the build uploads -- no review wait needed for that.
        # Flip to true later if/when external testers are added.
        submit_to_testflight: false
